id: io.github.noobping.keycord
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk

sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.llvm20

command: keycord

finish-args:
  - --device=dri
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland

modules:
  - name: capnproto
    buildsystem: autotools
    subdir: c++
    no-autogen: true
    config-opts:
      - --disable-static

    sources:
      - type: git
        url: https://github.com/capnproto/capnproto.git
        tag: v1.3.0
        commit: 7dbb95989721016f8b590245ec7528c6ff03d1fe
      - type: shell
        commands:
          - cd c++ && autoreconf -fi

  - name: pcsc-lite
    buildsystem: meson
    config-opts:
      - -Dlibsystemd=false
      - -Dpolkit=false
      - -Dipcdir=/run/pcscd

    sources:
      - type: git
        url: https://github.com/LudovicRousseau/PCSC.git
        tag: 2.3.3
        commit: 3ef55e02979de6834015b380c1d21671eeb4e9f5

  - name: libcbor
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_TESTING=OFF
    sources:
      - type: git
        url: https://github.com/PJK/libcbor.git
        tag: v0.13.0
        commit: 9826a4315116a588f7416912db9da6fcecd8da11

  - name: libfido2
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_EXAMPLES=OFF
      - -DBUILD_MANPAGES=OFF
      - -DBUILD_STATIC_LIBS=OFF
      - -DBUILD_TOOLS=OFF
      - -DNFC_LINUX=OFF
      - -DUSE_HIDAPI=ON
    sources:
      - type: git
        url: https://github.com/Yubico/libfido2.git
        tag: 1.16.0
        commit: 7dc6b3c52d441c64a4235ae276a23865243395a1

  - name: git
    buildsystem: autotools
    no-autogen: true
    config-opts:
      - --without-tcltk
    make-args:
      - prefix=/app
      - NO_GETTEXT=YesPlease
      - NO_INSTALL_HARDLINKS=YesPlease
      - NO_PERL=YesPlease
      - NO_PYTHON=YesPlease
      - SKIP_DASHED_BUILT_INS=YesPlease

    sources:
      - type: git
        url: https://github.com/git/git.git
        tag: v2.49.1
        commit: aadf8ae518afd80b73d49eff8aff475161aa5157
      - type: shell
        commands:
          - make configure

  - name: keycord
    buildsystem: simple

    build-options:
      prepend-path: /app/bin:/usr/lib/sdk/llvm20/bin
      prepend-ld-library-path: /app/lib:/usr/lib/sdk/llvm20/lib
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CLANG_PATH: /usr/lib/sdk/llvm20/bin/clang
        CARGO_HOME: /run/build/keycord/cargo
        LIBCLANG_PATH: /usr/lib/sdk/llvm20/lib
        BINDGEN_EXTRA_CLANG_ARGS: -resource-dir=/usr/lib/sdk/llvm20/lib/clang/20

    build-commands:
      - sed -i '/\[target.\x27cfg(target_os = "windows")\x27.*ependencies\]/,/^$/d' Cargo.toml
      - cargo --offline build --release --features flatpak
      - install -Dm0755 target/release/keycord /app/bin/keycord
      - install -Dm0644 data/scalable/apps/${FLATPAK_ID}.svg /app/share/icons/hicolor/scalable/apps/${FLATPAK_ID}.svg
      - install -Dm0644 keycord-search-provider.ini /app/share/gnome-shell/search-providers/${FLATPAK_ID}.search-provider.ini
      - install -Dm0644 keycord-search-provider.service /app/share/dbus-1/services/${FLATPAK_ID}.SearchProvider.service
      - install -Dm0644 data/gschema.xml /app/share/glib-2.0/schemas/${FLATPAK_ID}.gschema.xml
      - glib-compile-schemas /app/share/glib-2.0/schemas
      - mkdir mo
      - |
        for f in po/*.po; do
          lang=$(basename "$f" .po)
          mkdir -p "/app/share/locale/$lang/LC_MESSAGES"
          msgfmt "$f" -o "/app/share/locale/$lang/LC_MESSAGES/keycord.mo"
          msgfmt "$f" -o "mo/$lang.mo"
        done
      - itstool -j data/metainfo.xml -o data/${FLATPAK_ID}.metainfo.xml mo/*.mo
      - install -Dm0644 data/${FLATPAK_ID}.metainfo.xml /app/share/metainfo/${FLATPAK_ID}.metainfo.xml
      - msgfmt --desktop --template=keycord.desktop -d po -o ${FLATPAK_ID}.keycord.desktop
      - install -Dm0644 ${FLATPAK_ID}.keycord.desktop /app/share/applications/${FLATPAK_ID}.desktop

    sources:
      - type: git
        url: https://github.com/noobping/keycord.git
        commit: c40c5019ff281315d6ed58574b10a2db4e1c86b8
      - cargo-sources.yml
